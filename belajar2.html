<html>
    <head>
        <title>Belajar HTML</title> 
    </head>
    <body>
        <b><u>Belajar HTML</u></b>
        <form action="proses.php" method="post">
            <label for="nama">Nama:<input type="text" id="nama" name="nama" size="25"></label><br>
            <label for="alamat">Alamat:</label><br>
            <textarea id="alamat" name="alamat" rows="4" cols="50" style="width: 300px; height: 50px;" text-align="left"></textarea><br>
            <label for="Jenis Kelamin">Jenis Kelamin:</label><br>
            <input type="radio" id="laki" name="jenis_kelamin" value="laki">
            <label for="laki">Laki-laki</label>
            <input type="radio" id="perempuan" name="jenis_kelamin" value="perempuan">
            <label for="perempuan">Perempuan</label><br>
            <label for="pekerjaan">Pekerjaan:</label><br>
            <select id="pekerjaan" name="pekerjaan">
                <option value="pelajar">Pelajar</option>
                <option value="mahasiswa">Mahasiswa</option>
                <option value="karyawan">Karyawan</option>
                <option value="wiraswasta">Wiraswasta</option>
            </select><br>

            <label for="hobi">Hobi:</label><br>
            <input type="checkbox" id="hobi1" name="hobi[]" value="membaca">
            <label for="hobi1">Membaca</label><br>
            <input type="checkbox" id="hobi2" name="hobi[]" value="olahraga">
            <label for="hobi2">Olahraga</label><br>
            <input type="checkbox" id="hobi3" name="hobi[]" value="musik">
            <label for="hobi3">Musik</label><br>

            <input type="reset" value="Cancel">
            <input type="submit" value="Proseskeun">
        </form>
    </body>
</html>
